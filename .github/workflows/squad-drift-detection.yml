name: Squad Drift Detection

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly Sunday 3 AM UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  drift-detection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect squad drift
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const findings = [];

            // 1. List all agent directories
            const agentsDir = '.squad/agents';
            if (!fs.existsSync(agentsDir)) {
              core.setFailed('.squad/agents directory not found');
              return;
            }

            const agentDirs = fs.readdirSync(agentsDir, { withFileTypes: true })
              .filter(d => d.isDirectory())
              .map(d => d.name);

            // 2. Check each agent has charter.md and history.md
            for (const agent of agentDirs) {
              const charterPath = path.join(agentsDir, agent, 'charter.md');
              const historyPath = path.join(agentsDir, agent, 'history.md');

              if (!fs.existsSync(charterPath)) {
                findings.push(`❌ Agent \`${agent}\` missing \`charter.md\``);
              }
              if (!fs.existsSync(historyPath)) {
                findings.push(`⚠️ Agent \`${agent}\` missing \`history.md\``);
              }
            }

            // 3. Parse team.md for agent references
            const teamFile = '.squad/team.md';
            if (!fs.existsSync(teamFile)) {
              findings.push('❌ `.squad/team.md` not found');
            } else {
              const teamContent = fs.readFileSync(teamFile, 'utf8');

              // Extract agent names from charter paths in team.md
              const charterPattern = /\.squad\/agents\/([^/]+)\/charter\.md/g;
              const teamAgents = new Set();
              let match;
              while ((match = charterPattern.exec(teamContent)) !== null) {
                teamAgents.add(match[1]);
              }

              // Check for agents in directories but not in team.md
              for (const agent of agentDirs) {
                if (!teamAgents.has(agent)) {
                  findings.push(`🔍 Agent directory \`${agent}\` exists but is not referenced in \`team.md\``);
                }
              }

              // Check for agents in team.md but missing directories
              for (const agent of teamAgents) {
                if (!agentDirs.includes(agent)) {
                  findings.push(`🔍 Agent \`${agent}\` referenced in \`team.md\` but has no directory in \`.squad/agents/\``);
                }
              }
            }

            // 4. Report findings
            if (findings.length === 0) {
              core.info('✅ No drift detected — all agents and team.md are in sync');
              return;
            }

            core.warning(`Found ${findings.length} drift issue(s)`);

            const body = [
              '## 🔍 Squad Drift Detection Report\n',
              `Found **${findings.length}** issue(s):\n`,
              ...findings.map(f => `- ${f}`),
              '',
              '---',
              '_Auto-generated by squad-drift-detection workflow_'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔍 Squad Drift Detected — ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['squad-drift']
            });

            core.info('Created drift detection issue');
