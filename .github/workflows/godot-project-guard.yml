name: project.godot Guard
on:
  pull_request:
    paths:
      - 'games/ashfall/project.godot'

jobs:
  warn:
    runs-on: ubuntu-latest
    steps:
      - name: Flag project.godot change
        uses: actions/github-script@v7
        with:
          script: |
            const body = `⚠️ **project.godot modified** — This file is the #1 merge conflict hotspot.
            
            Please verify:
            - [ ] Autoload order is correct (EventBus → GameState → RoundManager → VFXManager → AudioManager → SceneManager)
            - [ ] No input actions were accidentally removed
            - [ ] Collision layer assignments unchanged unless intentional
            
            cc: @jperezdelreal (Solo reviews all project.godot changes)`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
