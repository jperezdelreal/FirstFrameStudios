name: Integration Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gdscript-lint:
    name: GDScript Standards Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: "Check 1: No := with dictionary/array access (Godot 4.6 type inference bug)"
        run: |
          echo "🔍 Scanning .gd files for ':=' with dictionary/array access patterns..."
          VIOLATIONS=""

          # Match := with dictionary access: var x := something["key"]
          DICT_HITS=$(grep -rn ':=.*\[' --include='*.gd' games/ || true)
          # Filter to lines that look like dict/array value assignment (not const declarations)
          if [ -n "$DICT_HITS" ]; then
            # Exclude const lines (const X := [...] is fine) and comments
            FILTERED=$(echo "$DICT_HITS" | grep -v '^\s*const ' | grep -v '^\s*#' || true)
            if [ -n "$FILTERED" ]; then
              VIOLATIONS="$FILTERED"
            fi
          fi

          if [ -n "$VIOLATIONS" ]; then
            echo "❌ Found ':=' with dictionary/array access (use explicit type instead):"
            echo "$VIOLATIONS"
            echo ""
            echo "Fix: Replace 'var x := dict[\"key\"]' with 'var x: Type = dict[\"key\"]'"
            exit 1
          fi

          echo "✅ No ':=' with dictionary/array access violations found."

      - name: "Check 2: No _process in gameplay scripts (use _physics_process)"
        run: |
          echo "🔍 Scanning gameplay scripts for _process usage..."
          VIOLATIONS=""

          # Look for _process in gameplay scripts (not tool scripts, not UI)
          HITS=$(grep -rn 'func _process(' --include='*.gd' games/ || true)
          if [ -n "$HITS" ]; then
            # Exclude @tool scripts (tools/) and UI scripts
            FILTERED=$(echo "$HITS" | grep -v '/tools/' | grep -v '/ui/' | grep -v '^\s*#' || true)
            if [ -n "$FILTERED" ]; then
              VIOLATIONS="$FILTERED"
            fi
          fi

          if [ -n "$VIOLATIONS" ]; then
            echo "❌ Found _process() in gameplay scripts (use _physics_process instead):"
            echo "$VIOLATIONS"
            echo ""
            echo "Fix: Replace 'func _process(delta)' with 'func _physics_process(delta)'"
            exit 1
          fi

          echo "✅ No _process violations in gameplay scripts."

      - name: "Check 3: Public functions must have explicit return types"
        run: |
          echo "🔍 Scanning for public functions without explicit return types..."
          VIOLATIONS=""

          # Public functions: lines starting with 'func ' (not '_' prefixed name)
          # that do NOT have '-> Type' before the colon
          HITS=$(grep -rn '^func [^_]' --include='*.gd' games/ || true)
          if [ -n "$HITS" ]; then
            # Filter out functions that already have return types (contain '-> ')
            MISSING=$(echo "$HITS" | grep -v '\->' || true)
            if [ -n "$MISSING" ]; then
              VIOLATIONS="$MISSING"
            fi
          fi

          if [ -n "$VIOLATIONS" ]; then
            echo "❌ Found public functions without explicit return types:"
            echo "$VIOLATIONS"
            echo ""
            echo "Fix: Add return type annotation, e.g. 'func my_func() -> void:'"
            exit 1
          fi

          echo "✅ All public functions have explicit return types."

      - name: Summary
        if: success()
        run: echo "✅ All GDScript standards checks passed!"
