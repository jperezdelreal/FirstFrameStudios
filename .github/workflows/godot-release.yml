name: Godot Build & Release

on:
  push:
    tags:
      - 'ashfall-v*'
      - 'ashfall-sprint-*-shipped'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., ashfall-v0.1.0)'
        required: false
        default: 'ashfall-v0.0.0-dev'

jobs:
  export-game:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install Godot 4.6
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          unzip -q Godot_v4.6-stable_linux.x86_64.zip
          sudo mv Godot_v4.6-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version
      
      - name: Install Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz
          unzip -q Godot_v4.6-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.6.stable/
      
      - name: Create output directory
        run: mkdir -p games/ashfall/builds/windows
      
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "tag_clean=${TAG#ashfall-}" >> $GITHUB_OUTPUT
      
      - name: Export Windows build
        working-directory: games/ashfall
        run: |
          godot --headless --export-release "Windows Desktop" builds/windows/Ashfall.exe
      
      - name: Create release archive
        run: |
          cd games/ashfall/builds/windows
          zip -r Ashfall-${{ steps.version.outputs.tag_clean }}-windows.zip .
      
      - name: Check if sprint release
        id: sprint_check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if [[ $TAG =~ ^ashfall-sprint-.*-shipped$ ]]; then
            echo "is_sprint=true" >> $GITHUB_OUTPUT
          else
            echo "is_sprint=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Ashfall ${{ steps.version.outputs.tag_clean }}
          body: |
            ## Ashfall - 1v1 Fighting Game
            
            **Download the Windows build below and extract to play.**
            
            ### Changes in this release
            See commit history for details.
          files: |
            games/ashfall/builds/windows/Ashfall-${{ steps.version.outputs.tag_clean }}-windows.zip
          draft: false
          prerelease: ${{ steps.sprint_check.outputs.is_sprint == 'true' }}


